name: Update GitHub Metrics SVG

on:
  schedule:
    - cron: "0 0 * * *"   # once a day at midnight UTC
  workflow_dispatch:        # allows manual "Run workflow" trigger too

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Raimal-Raja
          filename: github-metrics.svg
          committer_message: "chore: update github-metrics.svg"
          base: ""
          config_timezone: Asia/Karachi

          # Feature toggles — trimmed to what the README uses
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_threshold: 0
          plugin_habits: no
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
